<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html,
    body {
      width: 1086px;
      height: 1448px;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }

    .card {
      position: relative;
      width: 1086px;
      height: 1448px;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
    }

    .portrait {
      position: absolute;
      inset: 0;
      width: 1086px;
      height: 1448px;
      object-fit: cover;
    }

    .text {
      position: absolute;
      left: 63px;
      top: 1180px;
      color: #000;
      font-weight: 700;
      letter-spacing: -1.6px;
    }

    .name {
      margin: 0 0 22px;
      color: #00499a;
      font-size: 74px;
      line-height: 1;
    }

    .role,
    .area {
      margin: 0;
      font-size: 46px;
      line-height: 1.15;
    }

    .role {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="portrait" src="siky-export-lead-base.png" alt="">
    <div class="text">
      <p class="name">Siky</p>
      <p class="role">Export Lead</p>
      <p class="area">Buyer Coordination</p>
    </div>
  </main>
</body>
</html>
